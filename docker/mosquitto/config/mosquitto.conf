# Mosquitto MQTT Broker – Konfiguration für FleetController Dev/Test
listener 1883
allow_anonymous true

# WebSocket-Support (optional, nützlich für Browser-Clients)
listener 9001
protocol websockets

# Logging
log_type all
log_dest stdout

# Persistence (Nachrichten überleben Broker-Neustart)
persistence true
persistence_location /mosquitto/data/
