name: FleetController

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fleet-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-fleet_manager}
      - POSTGRES_USER=${POSTGRES_USER:-fleet}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fleet}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleet} -d ${POSTGRES_DB:-fleet_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleet-net

  # ── MQTT Broker ──────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: fleet-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket (optional)
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleet-net

  # ── FleetManager (ASP.NET Core 8) ────────────────────────────────────────────
  fleet-controller:
    build:
      context: ..                 # Repo-Root (eine Ebene über diesem Ordner)
      dockerfile: docker/Dockerfile
    container_name: fleet-controller
    restart: unless-stopped
    ports:
      - "${FLEET_HTTP_PORT:-8080}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:8080
      - Mqtt__Host=${MQTT_HOST:-mosquitto}
      - Mqtt__Port=${MQTT_PORT:-1883}
      - Mqtt__ClientId=${MQTT_CLIENT_ID:-fleet-controller-01}
      - Mqtt__InterfaceName=${MQTT_INTERFACE_NAME:-uagv}
      - Mqtt__MajorVersion=${MQTT_MAJOR_VERSION:-v2}
      - ConnectionStrings__Fleet=Host=postgres;Port=5432;Database=${POSTGRES_DB:-fleet_manager};Username=${POSTGRES_USER:-fleet};Password=${POSTGRES_PASSWORD:-fleet}
      - SEQ_URL=http://seq:5341
    depends_on:
      mosquitto:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - fleet-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/fleet/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Seq (structured log UI) ──────────────────────────────────────────────────
  # Start with: docker compose --profile monitoring up
  # UI: http://localhost:5341
  seq:
    image: datalust/seq:latest
    container_name: fleet-seq
    profiles:
      - monitoring
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:5341"   # ingestion + UI
    volumes:
      - seq-data:/data
    networks:
      - fleet-net

  # ── MQTT Explorer (raw MQTT messages) ─────────────────────────────────────────
  # Start with: docker compose --profile tools up
  # UI: http://localhost:4000
  mqtt-explorer:
    image: smeagolworms4/mqtt-explorer
    container_name: fleet-mqtt-explorer
    restart: unless-stopped
    profiles:
      - tools
    ports:
      - "4000:4000"
    environment:
      - HTTP_PORT=4000
      - CONFIG_PATH=/mqtt-explorer/config
    volumes:
      - mqtt-explorer-config:/mqtt-explorer/config
    depends_on:
      - mosquitto
    networks:
      - fleet-net

volumes:
  postgres-data:
  mosquitto-data:
  mosquitto-logs:
  mqtt-explorer-config:
  seq-data:

networks:
  fleet-net:
    driver: bridge
